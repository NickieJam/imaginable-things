<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="robots" content="noindex,nofollow"><meta name="theme-color" content="#08090f"><title>Customer Hub | Imaginable OS</title><link rel="icon" href="../assets/images/logo.webp"><style>
:root{color-scheme:dark;--bg:#08090f;--panel:#11131b;--line:#2a2e3c;--text:#f8f8fb;--muted:#aeb3c2;--accent:#ff7a18;--accent2:#ff3d81;--ok:#56d58b}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 100% 0,rgba(255,61,129,.13),transparent 30rem),var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{width:min(1120px,calc(100% - 24px));margin:auto;padding:22px 0 50px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:22px}.brand{display:flex;gap:12px;align-items:center}.brand img{width:44px;height:44px;object-fit:contain}.brand p{margin:0;color:#ffc28e;font-size:.7rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.brand h1{margin:2px 0 0;font-size:1.35rem}.back{border:1px solid var(--line);border-radius:12px;padding:10px 13px;text-decoration:none;color:var(--text)}.hero,.draft{padding:24px;border:1px solid var(--line);border-radius:22px;background:rgba(17,19,27,.9)}.hero h2{margin:0 0 8px;font-size:clamp(1.8rem,7vw,3.5rem);letter-spacing:-.05em}.hero p,.draft p{margin:0;color:var(--muted);line-height:1.6}.draft{margin:18px 0;border-color:rgba(86,213,139,.45);background:rgba(86,213,139,.08)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px;margin-top:18px}.card{border:1px solid var(--line);border-radius:18px;background:rgba(17,19,27,.92);padding:18px}.card h3{margin:0 0 4px}.company{color:var(--muted)}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:16px 0}.meta div{padding:10px;border-radius:12px;background:rgba(255,255,255,.035)}.meta span{display:block;color:var(--muted);font-size:.7rem}.meta strong{display:block;margin-top:4px;font-size:.86rem;overflow-wrap:anywhere}.actions{display:flex;flex-wrap:wrap;gap:9px;margin-top:15px}.button{flex:1;min-width:135px;text-align:center;text-decoration:none;padding:11px;border-radius:12px;font-weight:850;background:linear-gradient(120deg,var(--accent),var(--accent2));border:0;color:#fff;cursor:pointer}.button.secondary{background:transparent;border:1px solid var(--line)}.empty{grid-column:1/-1;padding:34px;text-align:center;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}@media(max-width:720px){.grid{grid-template-columns:1fr}}@media(max-width:450px){.shell{width:min(100% - 18px,1120px)}.top{align-items:flex-start}.meta{grid-template-columns:1fr}}
</style></head><body><main class="shell"><header class="top"><div class="brand"><img src="../assets/images/logo.webp" alt=""><div><p>Imaginable OS</p><h1>Customer Hub</h1></div></div><a class="back" href="index.html">← Dashboard</a></header><section class="hero"><h2>Customer history, ready to grow.</h2><p>Keep contact details, order history and preferences together for faster repeat business.</p></section><section class="draft" id="draftPanel" hidden></section><section class="grid" id="customers"><div class="empty">Loading customers…</div></section></main><script src="customers.js" defer></script></body></html>
