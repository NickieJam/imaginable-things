<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#08090f">
  <title>Job Tracker | Imaginable OS</title>
  <link rel="icon" href="../assets/images/logo.webp">
  <style>
    :root{color-scheme:dark;--bg:#08090f;--panel:#11131b;--line:#2a2e3c;--text:#f8f8fb;--muted:#aeb3c2;--accent:#ff7a18;--accent2:#ff3d81;--ok:#56d58b;--warn:#ffc766}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 100% 0,rgba(255,61,129,.13),transparent 30rem),var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{width:min(1120px,calc(100% - 24px));margin:auto;padding:22px 0 50px}.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:22px}.brand{display:flex;gap:12px;align-items:center}.brand img{width:44px;height:44px;object-fit:contain}.brand p{margin:0;color:#ffc28e;font-size:.7rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.brand h1{margin:2px 0 0;font-size:1.35rem}.back{border:1px solid var(--line);border-radius:12px;padding:10px 13px;text-decoration:none}.hero{padding:25px;border:1px solid var(--line);border-radius:22px;background:rgba(17,19,27,.9)}.hero h2{margin:0 0 8px;font-size:clamp(1.8rem,7vw,3.5rem);letter-spacing:-.05em}.hero p{margin:0;color:var(--muted);line-height:1.6}.toolbar{display:flex;flex-wrap:wrap;gap:9px;margin:18px 0}.filter{border:1px solid var(--line);background:var(--panel);color:var(--text);padding:10px 13px;border-radius:999px;font-weight:750}.filter.active{background:linear-gradient(120deg,var(--accent),var(--accent2));border-color:transparent}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:13px}.card{border:1px solid var(--line);border-radius:18px;background:rgba(17,19,27,.92);padding:18px}.card-head{display:flex;justify-content:space-between;gap:12px}.jobno{color:#ffc28e;font-size:.72rem;font-weight:850;letter-spacing:.1em;text-transform:uppercase}.card h3{margin:5px 0 3px;font-size:1.18rem}.company{color:var(--muted);font-size:.86rem}.badge{padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.07);font-size:.7rem;font-weight:850;height:max-content}.meta{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin:17px 0}.meta div{padding:10px;border-radius:12px;background:rgba(255,255,255,.035)}.meta span{display:block;color:var(--muted);font-size:.7rem}.meta strong{display:block;margin-top:4px;font-size:.86rem}.notes{color:var(--muted);line-height:1.5;font-size:.85rem}.actions{display:flex;gap:9px;margin-top:16px}.button{flex:1;text-align:center;text-decoration:none;padding:11px;border-radius:12px;font-weight:850;background:linear-gradient(120deg,var(--accent),var(--accent2))}.empty{padding:34px;text-align:center;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}@media(max-width:720px){.grid{grid-template-columns:1fr}.meta{grid-template-columns:1fr 1fr}}@media(max-width:450px){.shell{width:min(100% - 18px,1120px)}.hero{padding:20px}.meta{grid-template-columns:1fr}.top{align-items:flex-start}}
  </style>
</head>
<body>
<main class="shell">
  <header class="top"><div class="brand"><img src="../assets/images/logo.webp" alt=""><div><p>Imaginable OS</p><h1>Job Tracker</h1></div></div><a class="back" href="index.html">← Dashboard</a></header>
  <section class="hero"><h2>Production at a glance.</h2><p>Review active jobs, priorities and due dates. Use Content Manager to create a job or update its status from your phone.</p></section>
  <div class="toolbar" id="filters"></div>
  <section class="grid" id="jobs"><div class="empty">Loading jobs…</div></section>
</main>
<script src="jobs.js" defer></script>
</body>
</html>
