media:
  - name: gallery
    label: Portfolio Photos
    input: assets/uploads
    output: /assets/uploads
    rename: safe
    extensions: [jpg, jpeg, png, webp]
  - name: videos
    label: Videos
    input: assets/uploads/videos
    output: /assets/uploads/videos
    rename: safe
    categories: [video]

content:
  - name: services
    label: Services
    type: file
    path: data/services.json
    fields:
      - name: services
        label: Services
        type: object
        list: true
        fields:
          - name: name
            label: Service name
            type: string
          - name: slug
            label: Service ID
            type: string
            description: Use lowercase letters and hyphens, for example custom-embroidery
          - name: short_description
            label: Short description
            type: text
          - name: description
            label: Full description
            type: text
          - name: image
            label: Service image
            type: image
            options:
              media: gallery
          - name: icon
            label: Icon name
            type: select
            options:
              values:
                - name: needle
                  label: Needle / Embroidery
                - name: shirt
                  label: Shirt / Apparel
                - name: sparkles
                  label: Sparkles / Sublimation
                - name: gift
                  label: Gift / Personalized Products
          - name: products
            label: Related products
            type: string
            list: true
          - name: featured
            label: Featured service
            type: boolean
          - name: visible
            label: Published on website
            type: boolean
            default: true
          - name: order
            label: Display position
            type: number
  - name: projects
    label: Portfolio Manager
    type: file
    path: data/projects.json
    fields:
      - name: projects
        label: Projects
        type: object
        list: true
        fields:
          - name: title
            label: Project name
            type: string
            required: true
            description: "Example: Custom Harley-Davidson Jacket"
          - name: category
            label: Category
            type: select
            options:
              values:
                - name: embroidery
                  label: Embroidery
                - name: apparel
                  label: Custom Apparel
                - name: hats
                  label: Hats
                - name: dtf
                  label: DTF Printing
                - name: sublimation
                  label: Sublimation
                - name: drinkware
                  label: Drinkware
                - name: accessories
                  label: Accessories & Gifts
                - name: banners-vinyl
                  label: Banners & Vinyl
          - name: client
            label: Client or organization
            type: string
            description: Optional. Leave blank if the customer name should remain private.
          - name: item_type
            label: Item type
            type: select
            options:
              values:
                - name: Shirt
                  label: Shirt
                - name: Hoodie
                  label: Hoodie
                - name: Jacket
                  label: Jacket
                - name: Hat
                  label: Hat
                - name: Uniform
                  label: Uniform
                - name: Tumbler
                  label: Tumbler
                - name: Mug
                  label: Mug
                - name: Banner
                  label: Banner
                - name: Accessory
                  label: Accessory
                - name: Other
                  label: Other
          - name: technique
            label: Main technique
            type: select
            options:
              values:
                - name: Embroidery
                  label: Embroidery
                - name: DTF Printing
                  label: DTF Printing
                - name: Sublimation
                  label: Sublimation
                - name: Vinyl
                  label: Vinyl
                - name: Custom Design
                  label: Custom Design
                - name: Mixed Techniques
                  label: Mixed Techniques
          - name: production_time
            label: Production time
            type: string
            description: "Optional. Example: 3 business days"
          - name: completed_date
            label: Completion date
            type: date
          - name: image
            label: Cover photo
            type: image
            required: true
            description: This is the first photo customers will see.
            options:
              media: gallery
          - name: description
            label: Project description
            type: text
          - name: gallery
            label: Gallery photos
            type: image
            list: true
            description: Add close-ups, back views, sleeves, or other angles.
            options:
              media: gallery
          - name: video
            label: Project video
            type: file
            description: Optional short video showing the finished work or process.
            options:
              media: videos
          - name: services
            label: Services used
            type: string
            list: true
          - name: featured
            label: Feature on website
            type: boolean
          - name: visible
            label: Published on website
            type: boolean
            default: true
          - name: order
            label: Display position
            type: number


  - name: jobs
    label: Job Tracker
    type: file
    path: data/jobs.json
    fields:
      - name: jobs
        label: Jobs
        type: object
        list: true
        fields:
          - name: job_number
            label: Job number
            type: string
            required: true
            description: "Example: IT-2026-001"
          - name: client
            label: Client name
            type: string
            required: true
          - name: company
            label: Company or organization
            type: string
          - name: product
            label: Product
            type: string
            required: true
            description: "Example: Richardson 112 hats"
          - name: quantity
            label: Quantity
            type: number
          - name: technique
            label: Technique
            type: select
            options:
              values:
                - name: Embroidery
                  label: Embroidery
                - name: DTF Printing
                  label: DTF Printing
                - name: Sublimation
                  label: Sublimation
                - name: Vinyl
                  label: Vinyl
                - name: Custom Design
                  label: Custom Design
                - name: Mixed Techniques
                  label: Mixed Techniques
          - name: status
            label: Job status
            type: select
            required: true
            options:
              values:
                - name: quote
                  label: Quote / New request
                - name: approved
                  label: Approved
                - name: waiting-materials
                  label: Waiting for materials
                - name: production
                  label: In production
                - name: quality-check
                  label: Quality check
                - name: ready
                  label: Ready for pickup or delivery
                - name: delivered
                  label: Delivered
                - name: cancelled
                  label: Cancelled
          - name: priority
            label: Priority
            type: select
            options:
              values:
                - name: low
                  label: Low
                - name: normal
                  label: Normal
                - name: high
                  label: High
                - name: urgent
                  label: Urgent
          - name: due_date
            label: Due date
            type: date
          - name: contact
            label: Phone or email
            type: string
          - name: notes
            label: Internal notes
            type: text
          - name: deposit_paid
            label: Deposit paid
            type: boolean
          - name: total
            label: Job total
            type: number
          - name: balance_due
            label: Balance due
            type: number
          - name: visible
            label: Active in Job Tracker
            type: boolean
            default: true
          - name: created_date
            label: Created date
            type: date

  - name: homepage
    label: Homepage Content
    type: file
    path: data/homepage.json
    fields:
      - name: announcement
        label: Announcement line
        type: string
      - name: hero
        label: Hero Section
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title_line_1
            label: Main title line 1
            type: string
          - name: title_line_2
            label: Main title line 2
            type: string
          - name: description
            label: Hero description
            type: text
          - name: primary_button_text
            label: Primary button text
            type: string
          - name: primary_button_link
            label: Primary button link
            type: string
          - name: secondary_button_text
            label: Secondary button text
            type: string
          - name: secondary_button_link
            label: Secondary button link
            type: string
          - name: video
            label: Hero video
            type: file
            options:
              media: videos
          - name: poster
            label: Hero poster image
            type: image
            options:
              media: gallery
      - name: about
        label: About Section
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title
            label: Main title
            type: string
          - name: paragraph_1
            label: Paragraph 1
            type: text
          - name: paragraph_2
            label: Paragraph 2
            type: text
          - name: paragraph_3
            label: Paragraph 3
            type: text
      - name: featured_section
        label: Featured Projects Heading
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title
            label: Main title
            type: string
          - name: description
            label: Description
            type: text
      - name: services_section
        label: Services Heading
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title_line_1
            label: Title line 1
            type: string
          - name: title_line_2
            label: Highlighted title line
            type: string
      - name: portfolio_section
        label: Portfolio Heading
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title_line_1
            label: Title line 1
            type: string
          - name: title_line_2
            label: Highlighted title line
            type: string
      - name: testimonials_section
        label: Testimonials Heading
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title_line_1
            label: Title line 1
            type: string
          - name: title_line_2
            label: Highlighted title line
            type: string
      - name: process
        label: How It Works Section
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title_line_1
            label: Title line 1
            type: string
          - name: title_line_2
            label: Highlighted title line
            type: string
          - name: steps
            label: Steps
            type: object
            list: true
            fields:
              - name: number
                label: Step number
                type: string
              - name: title
                label: Step title
                type: string
              - name: description
                label: Step description
                type: text
      - name: faq_section
        label: FAQ Heading
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title_line_1
            label: Title line 1
            type: string
          - name: title_line_2
            label: Highlighted title line
            type: string
      - name: quote_section
        label: Quote Section Heading
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
      - name: contact
        label: Contact Section
        type: object
        fields:
          - name: eyebrow
            label: Small headline
            type: string
          - name: title
            label: Main title
            type: string
          - name: description
            label: Description
            type: text
          - name: phone
            label: Phone number
            type: string
          - name: whatsapp
            label: WhatsApp number with country code
            type: string
          - name: email
            label: Email
            type: string
          - name: location
            label: Location
            type: string
          - name: note
            label: Short note
            type: string

  - name: testimonials
    label: Testimonials
    type: file
    path: data/testimonials.json
    fields:
      - name: testimonials
        label: Testimonials
        type: object
        list: true
        fields:
          - name: name
            label: Customer name
            type: string
          - name: company
            label: Business or organization
            type: string
          - name: quote
            label: Testimonial
            type: text
          - name: photo
            label: Customer photo or logo
            type: image
            description: Optional.
            options:
              media: gallery
          - name: rating
            label: Star rating
            type: number
            default: 5
          - name: order
            label: Display position
            type: number
          - name: visible
            label: Published on website
            type: boolean
            default: true


  - name: site
    label: Business Settings, FAQs & Quote
    type: file
    path: data/site.json
    fields:
      - name: business
        label: Business Settings
        type: object
        fields:
          - name: brand_name
            label: Brand name
            type: string
            required: true
          - name: legal_name
            label: Legal business name
            type: string
          - name: tagline
            label: Tagline
            type: string
          - name: logo
            label: Business logo
            type: image
            options:
              media: gallery
          - name: phone_display
            label: Phone number as displayed
            type: string
            description: "Example: 860-336-9202"
          - name: phone_number
            label: Phone number with country code
            type: string
            description: "Numbers only are best. Example: 18603369202"
          - name: whatsapp_number
            label: WhatsApp number with country code
            type: string
          - name: email
            label: Business email
            type: string
          - name: location
            label: Service area or location
            type: string
          - name: address
            label: Public address
            type: string
            description: Optional. Leave blank if customers should not see a street address.
          - name: business_hours
            label: Business hours
            type: string
          - name: contact_note
            label: Short contact note
            type: string
          - name: website
            label: Official website
            type: string
          - name: seo_title
            label: Browser and Google title
            type: string
          - name: seo_description
            label: Browser and Google description
            type: text
      - name: socials
        label: Social Media
        type: object
        fields:
          - name: facebook
            label: Facebook URL
            type: string
          - name: instagram
            label: Instagram URL
            type: string
          - name: tiktok
            label: TikTok URL
            type: string
      - name: quote_form
        label: Quote Form
        type: object
        fields:
          - name: heading
            label: Heading
            type: string
          - name: description
            label: Description
            type: text
          - name: whatsapp_number
            label: WhatsApp number with country code
            type: string
          - name: success_note
            label: Note below form
            type: string
          - name: project_types
            label: Project type options
            type: string
            list: true
      - name: faqs
        label: Frequently Asked Questions
        type: object
        list: true
        fields:
          - name: question
            label: Question
            type: string
          - name: answer
            label: Answer
            type: text
          - name: visible
            label: Published on website
            type: boolean
            default: true
          - name: order
            label: Display position
            type: number

settings:
  content:
    merge: direct
  commit:
    templates:
      create: "content: add {label}"
      update: "content: update {label}"
      delete: "content: remove {label}"
      uploadMedia: "media: upload {filename}"
